server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: usuarios-service
              uri: http://localhost:8081
              predicates:
                - Path=/usuarios/**
            - id: productos-service
              uri: http://localhost:8082
              predicates:
                - Path=/productos/**
            - id: inventario-service
              uri: http://localhost:8083
              predicates:
                - Path=/inventario/**
            - id: pagos-service
              uri: http://localhost:8084
              predicates:
                - Path=/pagos/**
            - id: logistica-service
              uri: http://localhost:8085
              predicates:
                - Path=/logistica/**